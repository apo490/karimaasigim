<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sorum Var</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeff3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 105, 135, 0.2);
            z-index: 10;
            width: 80%;
            max-width: 500px;
        }

        h1 {
            color: #ff4d6d;
            margin-bottom: 40px;
            font-size: 2.5em;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            font-size: 20px;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        #evetBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #evetBtn:hover {
            transform: scale(1.1);
        }

        #hayirBtn {
            background-color: #e0e0e0;
            color: #555;
            position: relative;
        }

        /* Atan kalp efekti için animasyon */
        @keyframes kalpAtisi {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .atan-kalp {
            font-size: 5em;
            margin-top: 20px;
            animation: kalpAtisi 1s infinite;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <h1>Beni seviyor musun? 🥺👉👈</h1>
        <div class="buttons">
            <button id="evetBtn">Evet ❤️</button>
            <button id="hayirBtn">Hayır 💔</button>
        </div>
    </div>

    <script>
        const hayirBtn = document.getElementById('hayirBtn');
        const evetBtn = document.getElementById('evetBtn');
        const container = document.getElementById('container');

        // Hayır butonunun kaçma özelliği
        hayirBtn.addEventListener('mouseover', () => {
            hayirBtn.style.position = 'absolute';
            const rastgeleX = Math.random() * (window.innerWidth - hayirBtn.offsetWidth);
            const rastgeleY = Math.random() * (window.innerHeight - hayirBtn.offsetHeight);
            hayirBtn.style.left = `${rastgeleX}px`;
            hayirBtn.style.top = `${rastgeleY}px`;
        });

        // Evet butonuna basınca sayfanın içeriğini değiştirme
        evetBtn.addEventListener('click', () => {
            container.innerHTML = `
                <h1 style="font-size: 3em; margin-bottom: 10px;">Biliyorduuuum! 🥰💖</h1>
                <p style="font-size: 1.5em; color: #ff4d6d; font-weight: bold;">Ben de seni çok seviyorum! 🧸🌸✨🦋🎀</p>
                <div class="atan-kalp">❤️</div>
            `;
        });
    </script>

</body>
</html>
